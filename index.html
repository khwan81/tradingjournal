<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매매일지</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --accent: #4ade80;
    --accent-dim: #166534;
    --red: #f87171;
    --red-dim: #7f1d1d;
    --text: #f0f0f0;
    --muted: #888;
    --font: 'SF Pro Display', -apple-system, 'Segoe UI', sans-serif;
    --mono: 'SF Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; }
  .header h1 span { color: var(--accent); }
  .status { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  /* Summary */
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .summary-card {
    background: var(--surface);
    padding: 14px 16px;
    text-align: center;
  }
  .summary-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .summary-value { font-size: 20px; font-weight: 700; font-family: var(--mono); letter-spacing: -0.5px; }
  .summary-value.up { color: var(--accent); }
  .summary-value.down { color: var(--red); }
  .summary-value.neutral { color: var(--text); }

  /* Form */
  .form-wrap {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field select, .field textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
  }
  .field input[type="number"] { text-align: right; }
  .field select option { background: var(--surface2); }
  .field textarea { resize: vertical; min-height: 60px; font-size: 13px; }

  .btn-submit {
    width: 100%;
    padding: 11px;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 4px;
  }
  .btn-submit:hover { background: #14532d; }
  .btn-submit:active { transform: scale(0.99); }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  /* List */
  .list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px 8px;
  }
  .list-header span { font-size: 12px; color: var(--muted); }
  .filter-wrap { display: flex; gap: 6px; }
  .filter-btn {
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .trade-list { padding: 0 12px 80px; }
  .trade-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 10px;
    align-items: start;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .trade-side {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .trade-side.buy { background: var(--accent-dim); color: var(--accent); }
  .trade-side.sell { background: var(--red-dim); color: var(--red); }

  .trade-info { min-width: 0; }
  .trade-name { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .trade-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .trade-memo { font-size: 12px; color: var(--muted); margin-top: 4px; font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .trade-right { text-align: right; flex-shrink: 0; }
  .trade-pnl { font-size: 16px; font-weight: 700; font-family: var(--mono); }
  .trade-pnl.up { color: var(--accent); }
  .trade-pnl.down { color: var(--red); }
  .trade-price { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: var(--mono); }
  .trade-delete {
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
    transition: color 0.15s;
    margin-top: 4px;
  }
  .trade-delete:hover { color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

  /* Auth */
  .auth-screen {
    max-width: 340px;
    margin: 80px auto;
    padding: 32px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    text-align: center;
  }
  .auth-screen h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .auth-screen p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .btn-google {
    width: 100%;
    padding: 12px;
    background: #fff;
    color: #333;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.15s;
  }
  .btn-google:hover { background: #f5f5f5; }
  .google-icon { width: 20px; height: 20px; }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: var(--muted);
    font-size: 14px;
    gap: 10px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Mobile adjustments */
  @media (max-width: 480px) {
    .summary-value { font-size: 16px; }
    .form-row { grid-template-columns: 1fr; }
    .form-row.three { grid-template-columns: 1fr 1fr; }
  }

  #app { display: none; }
  #app.visible { display: block; }
  #auth-screen { display: none; }
  #auth-screen.visible { display: block; }
  #loading-screen { display: flex; }
  #loading-screen.hidden { display: none; }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen" class="loading">
  <div class="spinner"></div>
  <span>연결 중...</span>
</div>

<!-- Auth -->
<div id="auth-screen">
  <div class="auth-screen">
    <div style="font-size:40px;margin-bottom:16px">📈</div>
    <h2>매매일지</h2>
    <p>Google 계정으로 로그인하면<br>PC와 모바일이 자동으로 싱크됩니다</p>
    <button class="btn-google" onclick="signIn()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google로 로그인
    </button>
    <p style="margin-top:16px;font-size:12px;color:#555">무료 · 광고 없음 · 데이터는 본인만 접근</p>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <div class="header">
    <h1>매매<span>일지</span></h1>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="status">
        <div class="status-dot online" id="status-dot"></div>
        <span id="status-text">동기화됨</span>
      </div>
      <button onclick="signOut()" style="background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;">로그아웃</button>
    </div>
  </div>

  <div class="summary">
    <div class="summary-card">
      <div class="summary-label">총 손익</div>
      <div class="summary-value" id="total-pnl" class="neutral">-</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">승률</div>
      <div class="summary-value neutral" id="win-rate">-</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">거래 수</div>
      <div class="summary-value neutral" id="trade-count">0</div>
    </div>
  </div>

  <!-- Entry Form -->
  <div class="form-wrap">
    <div class="form-row">
      <div class="field">
        <label>종목</label>
        <input type="text" id="f-name" placeholder="삼성전자, BTC..." autocomplete="off">
      </div>
      <div class="field">
        <label>매매구분</label>
        <select id="f-side">
          <option value="buy">매수</option>
          <option value="sell">매도</option>
        </select>
      </div>
    </div>
    <div class="form-row three">
      <div class="field">
        <label>진입가</label>
        <input type="number" id="f-entry" placeholder="0" step="any">
      </div>
      <div class="field">
        <label>청산가</label>
        <input type="number" id="f-exit" placeholder="0" step="any">
      </div>
      <div class="field">
        <label>손익(₩)</label>
        <input type="number" id="f-pnl" placeholder="0" step="any">
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>날짜</label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label>메모</label>
        <input type="text" id="f-memo" placeholder="진입 이유, 실수 등...">
      </div>
    </div>
    <button class="btn-submit" onclick="addTrade()" id="submit-btn">+ 기록 추가</button>
  </div>

  <!-- List -->
  <div class="list-header">
    <span id="list-label">최근 기록</span>
    <div class="filter-wrap">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('buy', this)">매수</button>
      <button class="filter-btn" onclick="setFilter('sell', this)">매도</button>
    </div>
  </div>

  <div class="trade-list" id="trade-list">
    <div class="empty-state">
      <div class="icon">📋</div>
      <div>첫 거래를 기록해보세요</div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ============================================================
// 🔧 여기에 Firebase 설정을 붙여넣으세요
// Firebase Console > 프로젝트 설정 > 앱 추가 > 웹앱 에서 복사
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyBJt7-rMw-mhmGu5GX2-aR7gNtrg_a4k1w",
  authDomain: "tradingjournal-f6afc.firebaseapp.com",
  projectId: "tradingjournal-f6afc",
  storageBucket: "tradingjournal-f6afc.firebasestorage.app",
  messagingSenderId: "673545133862",
  appId: "1:673545133862:web:90ec278804c2b035e96be7",
  measurementId: "G-Y1TSX20W9C"
};
// ============================================================

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let allTrades = [];
let currentFilter = 'all';
let unsubscribe = null;

// Auth
window.signIn = async () => {
  const provider = new GoogleAuthProvider();
  try { await signInWithPopup(auth, provider); }
  catch(e) { alert('로그인 실패: ' + e.message); }
};

window.signOut = async () => {
  if (unsubscribe) unsubscribe();
  await fbSignOut(auth);
};

onAuthStateChanged(auth, user => {
  document.getElementById('loading-screen').classList.add('hidden');
  if (user) {
    currentUser = user;
    document.getElementById('auth-screen').classList.remove('visible');
    document.getElementById('app').classList.add('visible');
    subscribeToTrades();
  } else {
    currentUser = null;
    document.getElementById('app').classList.remove('visible');
    document.getElementById('auth-screen').classList.add('visible');
    allTrades = [];
    renderTrades();
  }
});

// Realtime listener
function subscribeToTrades() {
  if (unsubscribe) unsubscribe();
  const q = query(
    collection(db, 'users', currentUser.uid, 'trades'),
    orderBy('date', 'desc')
  );
  unsubscribe = onSnapshot(q, snap => {
    allTrades = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderTrades();
    updateSummary();
  }, err => {
    console.error(err);
    document.getElementById('status-text').textContent = '오류';
    document.getElementById('status-dot').classList.remove('online');
  });
}

// Add trade
window.addTrade = async () => {
  const name = document.getElementById('f-name').value.trim();
  const side = document.getElementById('f-side').value;
  const entry = parseFloat(document.getElementById('f-entry').value) || 0;
  const exit = parseFloat(document.getElementById('f-exit').value) || 0;
  const pnl = parseFloat(document.getElementById('f-pnl').value) || 0;
  const date = document.getElementById('f-date').value;
  const memo = document.getElementById('f-memo').value.trim();

  if (!name || !date) { alert('종목명과 날짜는 필수입니다'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '저장 중...';

  try {
    await addDoc(collection(db, 'users', currentUser.uid, 'trades'), {
      name, side, entry, exit, pnl, date, memo,
      createdAt: serverTimestamp()
    });
    // Reset form (keep date & side)
    document.getElementById('f-name').value = '';
    document.getElementById('f-entry').value = '';
    document.getElementById('f-exit').value = '';
    document.getElementById('f-pnl').value = '';
    document.getElementById('f-memo').value = '';
  } catch(e) {
    alert('저장 실패: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '+ 기록 추가';
};

// Delete trade
window.deleteTrade = async (id) => {
  if (!confirm('삭제할까요?')) return;
  await deleteDoc(doc(db, 'users', currentUser.uid, 'trades', id));
};

// Filter
window.setFilter = (filter, el) => {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTrades();
};

function renderTrades() {
  const list = document.getElementById('trade-list');
  const filtered = currentFilter === 'all' ? allTrades
    : allTrades.filter(t => t.side === currentFilter);

  document.getElementById('list-label').textContent =
    `${filtered.length}건`;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📋</div><div>기록이 없습니다</div></div>`;
    return;
  }

  list.innerHTML = filtered.map(t => {
    const isUp = t.pnl >= 0;
    const pnlStr = (isUp ? '+' : '') + t.pnl.toLocaleString() + '원';
    const sideLabel = t.side === 'buy' ? '매수' : '매도';
    const priceStr = t.entry && t.exit ? `${t.entry.toLocaleString()} → ${t.exit.toLocaleString()}` : '';
    return `
    <div class="trade-item">
      <div class="trade-side ${t.side}">${sideLabel}</div>
      <div class="trade-info">
        <div class="trade-name">${escHtml(t.name)}</div>
        <div class="trade-meta">${t.date}${priceStr ? ' · ' + priceStr : ''}</div>
        ${t.memo ? `<div class="trade-memo">${escHtml(t.memo)}</div>` : ''}
      </div>
      <div class="trade-right">
        <div class="trade-pnl ${isUp ? 'up' : 'down'}">${pnlStr}</div>
        <button class="trade-delete" onclick="deleteTrade('${t.id}')">×</button>
      </div>
    </div>`;
  }).join('');
}

function updateSummary() {
  const total = allTrades.reduce((s, t) => s + (t.pnl || 0), 0);
  const wins = allTrades.filter(t => t.pnl > 0).length;
  const rate = allTrades.length ? Math.round(wins / allTrades.length * 100) : null;

  const pnlEl = document.getElementById('total-pnl');
  pnlEl.textContent = (total >= 0 ? '+' : '') + total.toLocaleString() + '원';
  pnlEl.className = 'summary-value ' + (total > 0 ? 'up' : total < 0 ? 'down' : 'neutral');

  document.getElementById('win-rate').textContent = rate !== null ? rate + '%' : '-';
  document.getElementById('trade-count').textContent = allTrades.length;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Set default date to today
document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
</script>
</body>
</html>
